log_path: logs/access_log.jsonl

time_window_minutes: 60

# each minute of age multiplies the access's contribution by this factor
decay_factor: 0.95

thresholds:
  hot: 50
  warm: 10
  cold: 0

replication:
  hot: 3
  warm: 2
  cold: 1

min_replication: 1
max_replication: 3

warehouse_path: /user/hive/warehouse

poll_interval_seconds: 30
