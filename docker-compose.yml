services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: namenode
    restart: always
    ports:
    - 9870:9870
    - 9000:9000
    volumes:
    - hadoop_namenode:/hadoop/dfs/name
    - ./logs:/opt/logs
    environment:
    - CLUSTER_NAME=hive-cluster
    env_file:
    - ./hadoop-hive.env
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode1
    restart: always
    ports:
    - 9864:9864
    volumes:
    - hadoop_datanode1:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
    env_file:
    - ./hadoop-hive.env
  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode2
    restart: always
    ports:
    - 9865:9864
    volumes:
    - hadoop_datanode2:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
    env_file:
    - ./hadoop-hive.env
  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode3
    restart: always
    ports:
    - 9866:9864
    volumes:
    - hadoop_datanode3:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
    env_file:
    - ./hadoop-hive.env
  datanode4:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode4
    restart: always
    ports:
    - 9867:9864
    volumes:
    - hadoop_datanode4:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
    env_file:
    - ./hadoop-hive.env
  datanode5:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode5
    restart: always
    ports:
    - 9868:9864
    volumes:
    - hadoop_datanode5:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
    env_file:
    - ./hadoop-hive.env
  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    platform: linux/amd64
    container_name: hive-metastore-postgresql
    restart: always
    volumes:
    - hive_metastore_postgresql:/var/lib/postgresql/data
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    platform: linux/amd64
    container_name: hive-metastore
    restart: always
    env_file:
    - ./hadoop-hive.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: namenode:9870 hive-metastore-postgresql:5432
    ports:
    - 9083:9083
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    platform: linux/amd64
    container_name: hive-server
    restart: always
    env_file:
    - ./hadoop-hive.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      SERVICE_PRECONDITION: hive-metastore:9083
    ports:
    - 10000:10000
    - 10002:10002
    volumes:
    - ./logs:/opt/logs
    - ./hive/hook/target/query-access-hook-1.0.jar:/opt/hive/lib/query-access-hook-1.0.jar
    - ./hive/conf/hive-site-override.xml:/opt/hive/conf/hive-site.xml
volumes:
  hadoop_namenode: null
  hadoop_datanode1: null
  hadoop_datanode2: null
  hadoop_datanode3: null
  hadoop_datanode4: null
  hadoop_datanode5: null
  hive_metastore_postgresql: null
